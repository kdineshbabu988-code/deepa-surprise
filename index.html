<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Women's Day Deepa</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@500;700&family=Poppins:wght@400;600&family=Satisfy&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #ffffff, #f7f7f7, #fff0f5);
      font-family: 'Poppins', sans-serif;
      position: relative;
    }

    .card {
      width: min(92vw, 420px);
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      padding: 20px 20px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      position: relative;
      z-index: 2;
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .slideshow {
      width: 100%;
      height: 240px;
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 16px;
      position: relative;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
    }

    .slide {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .slide.active {
      display: block;
      animation: fadeSlide 1s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0.35; transform: scale(1.03); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: 2rem;
      color: #b03060;
      margin-bottom: 8px;
      font-family: 'Dancing Script', cursive;
    }

    .name {
      font-size: 2rem;
      color: #8a2a50;
      margin-bottom: 14px;
      font-family: 'Great Vibes', cursive;
    }

    .message {
      font-size: 1.15rem;
      line-height: 1.7;
      color: #5a1a34;
      min-height: 120px;
      font-family: 'Satisfy', cursive;
    }

    button {
      margin-top: 20px;
      border: none;
      background: linear-gradient(135deg, #ff7aa8, #c2185b);
      color: white;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, .2);
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
    }

    .hidden {
      display: none;
      margin-top: 15px;
      font-size: 1.05rem;
      color: #8a2a50;
      font-family: 'Dancing Script', cursive;
      line-height: 1.6;
    }

    .hearts span {
      position: absolute;
      bottom: -50px;
      font-size: 20px;
      color: #ffffff;
      animation: floatUp linear infinite;
      user-select: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(.7);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.2);
        opacity: 0;
      }
    }

    .flowers span {
      position: absolute;
      top: -40px;
      font-size: 22px;
      animation: fall linear infinite;
      user-select: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="hearts">
    <span style="left:10%;animation-duration:8s">🤍</span>
    <span style="left:25%;animation-duration:10s">🤍</span>
    <span style="left:40%;animation-duration:7s">🤍</span>
    <span style="left:55%;animation-duration:11s">🤍</span>
    <span style="left:70%;animation-duration:9s">🤍</span>
    <span style="left:85%;animation-duration:12s">🤍</span>
  </div>

  <div class="flowers">
    <span style="left:15%;animation-duration:12s">🌸</span>
    <span style="left:35%;animation-duration:15s">🌸</span>
    <span style="left:60%;animation-duration:14s">🌸</span>
    <span style="left:80%;animation-duration:16s">🌸</span>
  </div>

  <div class="card">
    <div class="slideshow">
      <img src="c:\Users\navee\OneDrive\Desktop\love - wbsite\deepa1.jpeg" class="slide active" alt="Memory 1">
    </div>

    <h1>Happy Women's Day</h1>
    <div class="name">Deepa 🤍</div>

    <div class="message" id="typing"></div>

    <button onclick="showNote()">Tap for Surprise ✨</button>

    <div class="hidden" id="note">
      You are not just my girlfriend… you are my strength, my happiness, and my everything di thangom 🤍
    </div>
  </div>

  <audio autoplay loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c8c6a.mp3" type="audio/mpeg">
  </audio>

  <script>
    const text = "Deepa, you are my personal strength in my life, and you are my enough di thangom. Your smile makes my world brighter every day. Happy Women's Day my love 🤍";

    let i = 0;

    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 40);
      }
    }

    type();

    function showNote() {
      document.getElementById("note").style.display = "block";
    }
  </script>
</body>
</html>
